<section id="education">
  <div class="section-inner">
    <h2 class="section-title">教育背景</h2>
    <div class="timeline">
      {{- range .Site.Data.education.items }}
      <div class="timeline-item">
        <div class="timeline-header">
          <span class="timeline-org">{{ .school }}</span>
          <span class="timeline-period">{{ .period }}</span>
        </div>
        <p class="timeline-subtitle">{{ .degree }}</p>
        {{- with .desc }}<p class="timeline-desc">{{ . }}</p>{{ end }}
      </div>
      {{- end }}
    </div>
  </div>
</section>
