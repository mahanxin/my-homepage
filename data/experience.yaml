    tags: [Loco-Manipulation, RL, UMI, VLA, NMPC+WBC]
    highlights:
      - text: 主导四足+机械臂长程移动操作（Loco-Manipulation）算法研发。
        sub:
          - 融合UMI、π₀算法，实现真实场景下机械臂复杂操作。
          - 基于强化学习开发四足+机械臂全身运动控制算法。
          - 基于NMPC开发全身运控算法，实现自动开门等长序列操作任务。
      - text: 基于强化学习开发四足机器人盲走与视觉感知行走算法。
      - text: 参与CyberDog2研发，开发空翻等高动态动作控制算法。
      - text: 申请发明专利10余篇，荣获小米2022年度技术大奖优秀奖，2023年度小米青年工程师。

